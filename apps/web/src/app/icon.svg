<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#FF4785"/>
  <!-- 本体: 逆方向に開く本（背が右側） -->
  <path d="M7 9.5C7 8.67 7.67 8 8.5 8H16v16H8.5C7.67 24 7 23.33 7 22.5V9.5z" fill="rgba(255,255,255,0.65)"/>
  <path d="M16 8h7.5c.83 0 1.5.67 1.5 1.5v13c0 .83-.67 1.5-1.5 1.5H16V8z" fill="rgba(255,255,255,0.92)"/>
  <!-- 綴じ（右寄り = 逆方向） -->
  <rect x="15.5" y="8" width="1" height="16" fill="rgba(255,255,255,0.35)"/>
  <!-- 右ページ: デザイン要素（Figma的な図形） -->
  <circle cx="21" cy="12.5" r="2.5" fill="#FF4785" opacity="0.6"/>
  <rect x="18.5" y="17" width="5" height="3.5" rx="0.75" fill="#FF4785" opacity="0.4"/>
  <!-- 左ページ: コード </> が生まれる -->
  <text x="11.5" y="17.5" text-anchor="middle" font-family="monospace" font-weight="700" font-size="7" fill="#FF4785" opacity="0.55">&lt;/&gt;</text>
  <!-- 逆方向の矢印（右→左への流れ） -->
  <path d="M20 22.5l-8 0" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-dasharray="1.5 1"/>
  <path d="M13 21.5l-1 1 1 1" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
